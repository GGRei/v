name: Issue 27512 Windows GCC Repro

on:
  push:
  workflow_dispatch:

concurrency:
  group: issue-27512-windows-gcc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-gcc-repro:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      VFLAGS: -cc gcc
    steps:
      - uses: actions/checkout@v7

      - name: Show GCC version
        run: gcc --version

      - name: Check GCC implicit-declaration behavior
        shell: pwsh
        run: |
          @'
          void f(void) {
              fprintf(0, "%p", (void*)0);
          }
          '@ | Set-Content -Path implicit_fprintf_probe.c -NoNewline

          $gcc_log = & cmd /v:on /c "gcc -std=c99 -Werror=implicit-function-declaration -c implicit_fprintf_probe.c 2>&1 & echo __gcc_exit__:!ERRORLEVEL!"
          $gcc_log | ForEach-Object { Write-Host $_ }

      - name: Build V with GCC
        run: |
          .\makev.bat -gcc
          .\v.exe version
          .\v.exe doctor

      - name: Reproduce issue 27512
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path issue_27512_repro | Out-Null
          @'
          fn main() {
              print("HERE")
          }
          '@ | Set-Content -Path issue_27512_repro\main.v -NoNewline

          Push-Location issue_27512_repro
          $v_log = & ..\v.exe -cc gcc -showcc -show-c-output -keepc run .\main.v 2>&1
          $v_exit = $LASTEXITCODE
          Pop-Location

          $v_log | ForEach-Object { Write-Host $_ }

          if ($v_log -match "implicit declaration of function 'fprintf'" -or $v_log -match "include '<stdio.h>'") {
            throw "Issue 27512 reproduced: generated Windows GCC C uses fprintf without a visible stdio declaration."
          }

          if ($v_exit -ne 0) {
            exit $v_exit
          }
