name: V2 x64 part 3 examples

on:
  workflow_dispatch:
  push:
    branches:
      - v2-x64-backend-part3-examples-ci

concurrency:
  group: v2-x64-part3-examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux x64 examples
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Build V
        run: make -j4

      - name: Run Part 3 x64 graph example tests
        run: |
          set -euo pipefail
          ./v test -run-only test_x64_linux_dump_operator_identity_stdout_exact_bytes,test_x64_linux_dump_factorial_example_top_level_stdout_exact_bytes,test_x64_linux_map_clone_delete_array_index_delete_stdout_exact_bytes,test_x64_linux_topological_sorting_greedy_example_top_level_stdout_matches_v_run,test_x64_linux_graph_priority_queue_generic_mut_array_normal_required_stdout_exact_bytes,test_x64_linux_minimal_spann_tree_prim_example_top_level_normal_required_stdout_exact_bytes,test_x64_linux_graph_generic_map_edge_relax_normal_required_stdout_exact_bytes,test_x64_linux_bellman_ford_example_top_level_normal_required_stdout_exact_bytes vlib/v2/gen/x64/x64_runtime_smoke_test.v

  macos:
    name: macOS Intel x64 examples
    runs-on: macos-15-intel
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Build V
        run: make -j4

      - name: Run Part 3 x64 graph example tests
        run: |
          set -euo pipefail
          ./v test -run-only test_x64_macos_windows_dump_operator_identity_stdout_exact_bytes,test_x64_macos_windows_dump_factorial_example_top_level_stdout_exact_bytes,test_x64_macos_windows_map_clone_delete_array_index_delete_stdout_exact_bytes,test_x64_macos_windows_topological_sorting_greedy_example_top_level_stdout_matches_v_run,test_x64_macos_windows_graph_priority_queue_generic_mut_array_stdout_exact_bytes,test_x64_macos_windows_minimal_spann_tree_prim_example_top_level_stdout_exact_bytes,test_x64_macos_windows_graph_generic_map_edge_relax_stdout_exact_bytes,test_x64_macos_windows_bellman_ford_example_top_level_stdout_exact_bytes vlib/v2/gen/x64/x64_runtime_smoke_test.v

  windows:
    name: Windows x64 examples
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Build V
        shell: pwsh
        run: |
          .\makev.bat -msvc
          if ($LASTEXITCODE -ne 0) {
            throw "makev.bat -msvc failed with exit code $LASTEXITCODE"
          }

      - name: Run Part 3 x64 graph example tests
        shell: pwsh
        run: |
          .\v.exe test -run-only test_x64_macos_windows_dump_operator_identity_stdout_exact_bytes,test_x64_macos_windows_dump_factorial_example_top_level_stdout_exact_bytes,test_x64_macos_windows_map_clone_delete_array_index_delete_stdout_exact_bytes,test_x64_macos_windows_topological_sorting_greedy_example_top_level_stdout_matches_v_run,test_x64_macos_windows_graph_priority_queue_generic_mut_array_stdout_exact_bytes,test_x64_macos_windows_minimal_spann_tree_prim_example_top_level_stdout_exact_bytes,test_x64_macos_windows_graph_generic_map_edge_relax_stdout_exact_bytes,test_x64_macos_windows_bellman_ford_example_top_level_stdout_exact_bytes vlib/v2/gen/x64/x64_runtime_smoke_test.v
          if ($LASTEXITCODE -ne 0) {
            throw "Part 3 x64 graph example tests failed with exit code $LASTEXITCODE"
          }
