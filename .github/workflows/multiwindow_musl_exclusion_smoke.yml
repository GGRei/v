name: Package 2 multiwindow musl exclusion smoke

on:
  workflow_dispatch:
  push:
    branches:
      - smoke/x-multiwindow-windows-20260717
    paths:
      - '.github/workflows/multiwindow_musl_exclusion_smoke.yml'
      - 'vlib/gg/multiwindow_render_runtime_contract_test.v'

concurrency:
  group: package2-musl-exclusion-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  V_CI_MUSL: 1

jobs:
  multiwindow-musl-exclusion:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    container:
      image: thevlang/vlang:alpine-build
      env:
        VFLAGS: -cc gcc
      volumes:
        - ${{github.workspace}}:/opt/vlang
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Add Alpine build dependencies
        run: apk add libc6-compat gcompat gc gc-dev binutils diffutils elfutils
      - name: Build V
        run: CC=gcc make
      - name: Verify the multiwindow runtime contract is skipped under musl
        run: |
          set -eu
          log=/tmp/multiwindow_musl_exclusion.log
          if VTEST_HIDE_SKIP=0 ./v -silent test \
            vlib/gg/multiwindow_render_runtime_contract_test.v >"$log" 2>&1; then
            cat "$log"
          else
            cat "$log"
            exit 1
          fi
          grep -F 'SKIP' "$log"
          grep -F 'vlib/gg/multiwindow_render_runtime_contract_test.v' "$log"
